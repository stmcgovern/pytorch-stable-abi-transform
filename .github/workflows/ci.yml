name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 19
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main"
          sudo apt-get update
          sudo apt-get install -y libclang-19-dev libclang-cpp19-dev llvm-19-dev cmake ninja-build g++

      - name: Install CUDA headers
        id: cuda
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.9.0'
          method: 'network'
          sub-packages: '["cudart-dev", "crt"]'
          non-cuda-sub-packages: '["libcublas-dev", "libcusparse-dev", "libcusolver-dev"]'

      - name: Cache libtorch headers
        id: cache-libtorch
        uses: actions/cache@v4
        with:
          path: libtorch/include
          key: libtorch-headers-2.11.0-cpu

      - name: Download libtorch headers
        if: steps.cache-libtorch.outputs.cache-hit != 'true'
        run: |
          wget -qO libtorch.zip https://download.pytorch.org/libtorch/cpu/libtorch-shared-with-deps-2.11.0%2Bcpu.zip
          unzip -q libtorch.zip 'libtorch/include/*'
          rm -f libtorch.zip

      - name: Build
        run: |
          cmake -GNinja -B build -S .
          cmake --build build

      - name: Test
        run: |
          PYTORCH_DIR=${{ github.workspace }}/libtorch/include \
          RESOURCE_DIR=$(llvm-config-19 --prefix)/lib/clang/$(llvm-config-19 --version | cut -d. -f1) \
          CUDA_INCLUDE=${{ steps.cuda.outputs.CUDA_PATH }}/include \
          bash test/run_tests.sh
